name: Update Gemfile.lock
on:
  push:
    branches: [fix-activesupport-security]

permissions:
  contents: write

jobs:
  update-lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - name: Generate lockfile
        run: |
          gem install bundler
          bundle lock
      - name: Verify activesupport version
        run: |
          grep 'activesupport' Gemfile.lock
          ACTIVESUPPORT_VER=$(grep '^\s*activesupport (' Gemfile.lock | head -1 | sed 's/.*(\(.*\))/\1/')
          echo "activesupport version: $ACTIVESUPPORT_VER"
      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Gemfile.lock
          git commit -m "Regenerate Gemfile.lock with updated dependencies"
          git push
